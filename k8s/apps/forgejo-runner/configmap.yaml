---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgejo-runner-config
  namespace: forgejo-runner
data:
  config.yml: |
    log:
      level: info

    runner:
      file: /data/.runner
      capacity: 2
      timeout: 1h
      # Labels re-declare on daemon start; jobs pick an image per label.
      # Job images are digest-pinned like every other image in the cluster —
      # they run untrusted CI inside dind, which is more reason, not less.
      labels:
        - "docker:docker://node:22-bookworm@sha256:c601a46abb4d2ab80a9dc3da208d50d1122642d53f17a101926ace71e5a9bf1c"
        - "ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:act-24.04@sha256:c710431fbad9eb3bcb102d04e5ff74fbd0ce6e383f78afebfb3770a1a817fdf9"

    cache:
      enabled: true

    container:
      # Job containers run inside the dind sidecar (DOCKER_HOST env).
      network: bridge
