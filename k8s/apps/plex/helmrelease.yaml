---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: plex
  namespace: plex
spec:
  interval: 24h
  url: https://raw.githubusercontent.com/plexinc/pms-docker/gh-pages
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: plex
spec:
  interval: 30m
  chart:
    spec:
      chart: plex-media-server
      version: "0.11.0"
      sourceRef:
        kind: HelmRepository
        name: plex
  valuesFrom:
    - kind: Secret
      name: plex-claim
      valuesKey: claim
      targetPath: extraEnv.PLEX_CLAIM
    - kind: Secret
      name: plex-claim
      valuesKey: advertise-ip
      targetPath: extraEnv.ADVERTISE_IP
    - kind: ConfigMap
      name: plex-vars
      valuesKey: PLEX_IP
      targetPath: service.annotations.metallb\.universe\.tf/loadBalancerIPs
  values:
    image:
      tag: "1.42.2.10156-f737b826c@sha256:9c03c26b9479ba9a09935f3367459bfdc8d21545f42ed2a13258983c5be1b252"

    extraEnv:
      TZ: "America/Denver"

    service:
      type: LoadBalancer
      port: 32400
      externalTrafficPolicy: Local

    pms:
      configExistingClaim: plex-config-encrypted

    # Media and GPU volumes
    extraVolumes:
      - name: media
        persistentVolumeClaim:
          claimName: plex-media-encrypted
      - name: dev-dri
        hostPath:
          path: /dev/dri
          type: Directory

    extraVolumeMounts:
      - name: media
        mountPath: /data/media
        readOnly: true
      - name: dev-dri
        mountPath: /dev/dri

  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: plex-plex-media-server
            patch: |
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: filebrowser-db
                  emptyDir: {}
              - op: add
                path: /spec/template/spec/containers/-
                value:
                  name: filebrowser
                  image: filebrowser/filebrowser:v2.31.2@sha256:a4da9ca8364b0a1fc5dd36f7add92582bf673c0ae0bda8dd9bd13062c41d1715
                  args:
                    - --noauth
                    - --root=/srv
                    - --database=/database/filebrowser.db
                  ports:
                    - containerPort: 80
                  volumeMounts:
                    - name: media
                      mountPath: /srv
                    - name: filebrowser-db
                      mountPath: /database
                  resources:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                    limits:
                      cpu: 500m
                      memory: 256Mi
