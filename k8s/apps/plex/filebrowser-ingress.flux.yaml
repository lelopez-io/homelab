---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: plex-filebrowser-ingress
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./k8s/apps/plex/ingress
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sync
  postBuild:
    # Injects the household hostname from sops — the domain never appears
    # in plain manifests (same pattern as cert-manager-vars).
    substituteFrom:
      - kind: Secret
        name: plex-filebrowser-vars
