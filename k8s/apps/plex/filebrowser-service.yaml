---
apiVersion: v1
kind: Service
metadata:
  name: filebrowser
  namespace: plex
spec:
  # ClusterIP now — reach is via the private-tier Ingress (files host),
  # not a direct LAN LoadBalancer; the Trusted->:80 firewall rule retires.
  selector:
    app.kubernetes.io/name: plex-media-server
    app.kubernetes.io/instance: plex
  ports:
    - port: 80
      targetPort: 80
