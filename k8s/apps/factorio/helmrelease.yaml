---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: factorio
  namespace: factorio
spec:
  interval: 24h
  url: https://sqljames.github.io/factorio-server-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: factorio
  namespace: factorio
spec:
  interval: 30m
  chart:
    spec:
      chart: factorio-server-charts
      version: "2.5.2"
      sourceRef:
        kind: HelmRepository
        name: factorio
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      tag: "2.0.77@sha256:35237d3cb047107cecbf7a8ef6c4fab41acc65548b65526a1b15a5dd0cb670be"
      pullPolicy: IfNotPresent
    hostNetworkEnabled: false
    # ClusterIP: WAN players arrive via the frp lane (frpc targets the
    # cluster DNS name), LAN players via the ingress udp-services map
    # (factorio.lan). No per-service MetalLB IP.
    service:
      type: ClusterIP
      port: 34197
    persistence:
      enabled: true
      dataDir:
        existingClaim: factorio-data-encrypted
    factorioServer:
      save_name: "2024.10.23--factorio--olm-space-age"
      generate_new_save: false
      load_latest_save: false
    server_settings:
      name: "Openlandmark"
      description: "Experience is merely the name men gave to their mistakes."
      visibility:
        public: false
        lan: true
      require_user_verification: true
      max_players: 0
      auto_pause: true
      only_admins_can_pause_the_game: true
    map_gen_settings:
      seed: 1853500214
    admin_list:
      - lelopez
    resources:
      requests:
        memory: 2Gi
        cpu: 1000m
      limits:
        memory: 4Gi
        cpu: 2000m
