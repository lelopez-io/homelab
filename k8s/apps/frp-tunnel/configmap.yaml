---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frpc-config
  namespace: frp-tunnel
data:
  frpc.toml: |
    serverAddr = "{{ .Envs.FRP_SERVER_ADDR }}"
    serverPort = 7000

    auth.method = "token"
    auth.token = "{{ .Envs.FRP_TOKEN }}"

    # TLS on the control channel — frps has transport.tls.force = true.
    transport.tls.enable = true

    log.to = "console"
    log.level = "info"

    # Plex passthrough — forwards public 32400 (via frps) to Plex MetalLB IP.
    [[proxies]]
    name = "plex"
    type = "tcp"
    localIP = "192.168.10.40"
    localPort = 32400
    remotePort = 32400

    # Public HTTP tier — one lane for every tier hostname: the edge routes
    # by SNI without decrypting, the home ingress terminates the tier
    # wildcard and fans out by hostname.
    [[proxies]]
    name = "https-tier"
    type = "tcp"
    localIP = "192.168.10.42"
    localPort = 443
    remotePort = 8443
