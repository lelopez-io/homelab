---
apiVersion: v1
kind: Secret
metadata:
  name: via-wildcard-tls
  namespace: frp-tunnel
  annotations:
    # Reflector fills and keeps data in sync with the source Certificate's
    # secret. This stub is the per-namespace opt-in: every public-tier
    # service mirrors the wildcard into its own namespace with a reviewed
    # commit — one issuance, no per-namespace certificates (or CT entries).
    reflector.v1.k8s.emberstack.com/reflects: "ingress-nginx/via-wildcard-tls"
# NOT kubernetes.io/tls: that type requires tls.crt/tls.key at creation,
# which an empty stub can't have. Reflector patches in only the data, so
# the mirror stays Opaque; ingress-nginx reads the keys regardless.
type: Opaque
