---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frpc
  namespace: frp-tunnel
  labels:
    app.kubernetes.io/name: frp-tunnel
    app.kubernetes.io/component: frpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frp-tunnel
      app.kubernetes.io/component: frpc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frp-tunnel
        app.kubernetes.io/component: frpc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frpc
          image: fatedier/frpc:v0.69.0@sha256:2e7653fc08b28013f598ff20b024a7d8cce0f5ea810cab9e2e90ae7ce4687a6e
          imagePullPolicy: IfNotPresent
          args:
            - "-c"
            - "/etc/frp/frpc.toml"
          env:
            - name: FRP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: frp-token
                  key: token
            - name: FRP_SERVER_ADDR
              valueFrom:
                secretKeyRef:
                  name: frp-token
                  key: server-addr
          volumeMounts:
            - name: config
              mountPath: /etc/frp
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: frpc-config
            items:
              - key: frpc.toml
                path: frpc.toml
