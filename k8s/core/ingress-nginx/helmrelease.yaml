---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: "4.14.3"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Private-tier game lanes: LAN players reach game servers by name (the
    # *.lan wildcard resolves here); the stream proxy forwards to the
    # cluster service. One line per port — no per-service IPs, no
    # edge-repo DNS work.
    udp:
      "34197": "factorio/factorio-factorio-server-charts:34197"
    controller:
      service:
        type: LoadBalancer
        annotations:
          # Static IP so private-tier DNS records have a stable target
          metallb.universe.tf/loadBalancerIPs: "192.168.10.42"
      watchIngressWithoutClass: true
      # The sub-tier wildcard (issued by cert-manager into this namespace)
      # serves every private-tier Ingress — no per-service TLS secrets or
      # cert-manager annotations, so per-host certificates (and their
      # CT-log entries) are structurally impossible. Controller falls back
      # to its self-signed cert until the Certificate is first issued.
      extraArgs:
        default-ssl-certificate: "ingress-nginx/sub-wildcard-tls"
      metrics:
        enabled: true
