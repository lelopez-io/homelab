---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: reflector
  namespace: reflector
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Kubernetes API (watch source Secrets, write mirror Secrets)
    - to:
        - ipBlock:
            cidr: 192.168.10.30/32
        - ipBlock:
            cidr: 192.168.10.31/32
        - ipBlock:
            cidr: 192.168.10.32/32
      ports:
        - protocol: TCP
          port: 6443
