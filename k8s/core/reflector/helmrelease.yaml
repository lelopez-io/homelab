---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: emberstack
  namespace: reflector
spec:
  interval: 24h
  url: https://emberstack.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: reflector
spec:
  interval: 1h
  chart:
    spec:
      chart: reflector
      version: "10.0.60"
      sourceRef:
        kind: HelmRepository
        name: emberstack
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Cluster-wide Secret read/write is the tool's function: it mirrors
    # annotated source Secrets into the namespaces that opt in. Accepted
    # for a single-admin cluster; reflection itself stays opt-in on both
    # ends (source annotation + per-namespace mirror stub).
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 128Mi
        cpu: 100m
