---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-ui
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  path: ./k8s/core/longhorn/ui
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: sync
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: longhorn
      namespace: longhorn-system
  postBuild:
    # Injects the UI hostname from sops — the domain never appears in
    # plain manifests (same pattern as cert-manager-vars).
    substituteFrom:
      - kind: Secret
        name: longhorn-ui-vars
